# Configuracoes para o profile 'dev'
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_auto_car}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=${DB_USER:auto_car_api_user}
spring.datasource.password=${DB_PASS:autoCar@6678}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.datasource.hikari.maximum-pool-size=10

# =====================
# URL de Confirmacao de Conta
# =====================
app.confirmation.url=http://localhost:8080/auto-car-api/api/users/confirm

# cors
cors.allowedOrigins.url=http://localhost:8080
cors.allowedMethods.url=GET,POST,PUT,DELETE,OPTIONS,PATCH