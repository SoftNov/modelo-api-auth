spring.application.name=auto.car.api
server.port=8080
server.servlet.context-path=/auto-car-api
# swagger-ui custom path
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# =====================
# Configuracao de E-mail (Gmail)
# =====================
email.from=lucasnathannogueira@gmail.com

# Configuracoes SMTP do Gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:${email.from}}
spring.mail.password=${GMAIL_APP_PASSWORD:qmwbplflscpbwwhb}

# Propriedades do JavaMail para Gmail
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# =====================
# Configuracao JWT
# =====================
jwt.secret=${JWT_SECRET:minha-chave-secreta-super-segura-para-jwt-auto-car-api-2024-deve-ter-pelo-menos-256-bits}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Chave para criptografia dos dados do usuario dentro do JWT (AES-256)
jwt.data.encryption.key=${JWT_DATA_KEY:chave-secreta-para-criptografar-dados-usuario-jwt-256bits}

# =====================
# Integracoes Externas
# =====================
integration.viacep.url=https://viacep.com.br/ws
